version: "3.9"
services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    environment:
      API_TOKEN: change-me
      DATABASE_URL: postgresql+asyncpg://hyrepath:hyrepath@postgres:5432/hyrepath
      REDIS_URL: redis://redis:6379/0
      # Free-mode sidecars (default-on). Enrichers degrade to empty fragments
      # if these are unreachable, so this stays safe if a sidecar is skipped.
      SOCIAL_ANALYZER_URL: http://social-analyzer:9005
      GMAPS_SCRAPER_URL: http://google-maps-scraper:8080
      ENABLE_TIER1: "false"
      # LLM disambiguation (default stub = free, no network). Flip LLM_MODE and
      # start `--profile llm` when using the LiteLLM proxy.
      # For ${LLM_*} substitution from backend/.env:
      #   docker compose --env-file ../.env --profile llm up
      LLM_MODE: ${LLM_MODE:-stub}
      LITELLM_API_BASE: ${LITELLM_API_BASE:-}
      LITELLM_API_KEY: ${LITELLM_API_KEY:-}
      LITELLM_MODEL: ${LITELLM_MODEL:-gpt-4o-mini}
      LITELLM_FALLBACKS: ${LITELLM_FALLBACKS:-}
      DISAMBIGUATION_THRESHOLD: ${DISAMBIGUATION_THRESHOLD:-0.7}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    extra_hosts:
      - "host.docker.internal:${MULTILOGIN_HOST_IP:-host-gateway}"
    environment:
      API_TOKEN: change-me
      DATABASE_URL: postgresql+asyncpg://hyrepath:hyrepath@postgres:5432/hyrepath
      REDIS_URL: redis://redis:6379/0
      SOCIAL_ANALYZER_URL: http://social-analyzer:9005
      GMAPS_SCRAPER_URL: http://google-maps-scraper:8080
      # Tier 1 (LinkedIn photo) runs on the worker only — never enable on api.
      ENABLE_TIER1: ${ENABLE_TIER1:-false}
      BROWSER_MODE: ${BROWSER_MODE:-local}
      MULTILOGIN_SELENIUM_HOST: ${MULTILOGIN_SELENIUM_HOST:-http://host.docker.internal}
      LLM_MODE: ${LLM_MODE:-stub}
      LITELLM_API_BASE: ${LITELLM_API_BASE:-}
      LITELLM_API_KEY: ${LITELLM_API_KEY:-}
      LITELLM_MODEL: ${LITELLM_MODEL:-gpt-4o-mini}
      LITELLM_FALLBACKS: ${LITELLM_FALLBACKS:-}
      DISAMBIGUATION_THRESHOLD: ${DISAMBIGUATION_THRESHOLD:-0.7}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - tier1_artifacts:/app/backend/artifacts/tier1
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hyrepath
      POSTGRES_PASSWORD: hyrepath
      POSTGRES_DB: hyrepath
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hyrepath -d hyrepath"]
      interval: 5s
      timeout: 5s
      retries: 5
  # ── Free-mode sidecars (default-on) ─────────────────────────────
  # AGPL tools stay isolated behind HTTP; never imported into app/.
  social-analyzer:
    build:
      context: .
      dockerfile: Dockerfile.social-analyzer
    ports:
      - "9005:9005"
    restart: unless-stopped
  google-maps-scraper:
    image: gosom/google-maps-scraper:latest
    command: ["-web", "-addr", "0.0.0.0:8080", "-data-folder", "/gmapsdata"]
    ports:
      - "8080:8080"
    volumes:
      - gmaps_playwright_cache:/opt
      - gmaps_data:/gmapsdata
    restart: unless-stopped

  # ── Paid / heavy services (opt-in via `--profile`) ──────────────
  # Free-mode `docker compose up` never launches these. Flip the matching
  # provider mode flag AND start the profile when you pay.
  reacher:
    image: reacherhq/backend:latest
    profiles: ["paid"]
    environment:
      RCH_HTTP_HOST: 0.0.0.0
    restart: unless-stopped
  litellm:
    # Do NOT env_file the whole backend/.env — it injects Hyrepath DATABASE_URL
    # (sqlite) and crash-loops the proxy. Pass vendor keys via compose
    # --env-file ../.env interpolation only. Chat completions need no LiteLLM DB.
    # Newer proxy images require an explicit model_list (see litellm_config.yaml).
    image: ghcr.io/berriai/litellm:main-latest
    profiles: ["llm", "paid"]
    ports:
      - "4000:4000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # Only set LITELLM_MASTER_KEY in .env if you want proxy auth; an empty
      # value still enables "api key required" and breaks unauthenticated curls.
      # LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    restart: unless-stopped
  ollama:
    image: ollama/ollama:latest
    profiles: ["llm"]
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
  scrapoxy:
    image: scrapoxy/scrapoxy:latest
    profiles: ["paid"]
    restart: unless-stopped
  # NOTE: langfuse (v3) needs its own datastore stack; kept behind a profile so
  # a plain `docker compose up` stays light. LLMProvider.trace() is a no-op
  # until LANGFUSE_* is set, so free mode runs without it.
  langfuse:
    image: langfuse/langfuse:2
    profiles: ["observability"]
    environment:
      DATABASE_URL: postgresql://hyrepath:hyrepath@postgres:5432/hyrepath
      NEXTAUTH_SECRET: change-me
      SALT: change-me
      NEXTAUTH_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped
  changedetection:
    image: ghcr.io/dgtlmoon/changedetection.io:latest
    profiles: ["observability"]
    volumes:
      - changedetection_data:/datastore
    restart: unless-stopped
volumes:
  postgres_data:
  tier1_artifacts:
  ollama_data:
  changedetection_data:
  gmaps_playwright_cache:
  gmaps_data:
