version: "3.9"
services:
  migrate:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    working_dir: /app/backend
    environment:
      DATABASE_URL: postgresql+asyncpg://hyrepath:hyrepath@postgres:5432/hyrepath
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
  api:
    network_mode: host
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    environment:
      API_TOKEN: change-me
      DATABASE_URL: postgresql+asyncpg://hyrepath:hyrepath@postgres:5432/hyrepath
      REDIS_URL: redis://redis:6379/0
      # Free-mode sidecars (default-on). Enrichers degrade to empty fragments
      # if these are unreachable, so this stays safe if a sidecar is skipped.
      SOCIAL_ANALYZER_URL: http://social-analyzer:9005
      GMAPS_SCRAPER_URL: http://google-maps-scraper:8080
      ENABLE_TIER1: "false"
      # LLM disambiguation (default stub = free, no network). Flip LLM_MODE and
      # start `--profile llm` when using the LiteLLM proxy.
      # For ${LLM_*} substitution from backend/.env:
      #   docker compose --env-file ../.env --profile llm up
      LLM_MODE: ${LLM_MODE:-stub}
      LITELLM_API_BASE: ${LITELLM_API_BASE:-}
      LITELLM_API_KEY: ${LITELLM_API_KEY:-}
      LITELLM_MODEL: ${LITELLM_MODEL:-gpt-4o-mini}
      LITELLM_FALLBACKS: ${LITELLM_FALLBACKS:-}
      DISAMBIGUATION_THRESHOLD: ${DISAMBIGUATION_THRESHOLD:-0.7}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1}
      # Tier 3 â€” OSINT + email (free default-on sidecar + worker CLIs)
      GITRECON_SCRIPT: /opt/gitrecon/gitrecon.py
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      EMAIL_SLEUTH_BIN: email-sleuth
      EMAIL_VERIFIER_URL: http://email-verifier:8080
      EMAIL_VERIFY_LEVEL: ${EMAIL_VERIFY_LEVEL:-basic}
      EMAIL_VERIFY_MAX_PER_JOB: ${EMAIL_VERIFY_MAX_PER_JOB:-10}
      EMAIL_VERIFY_SMTP_DELAY_SECONDS: ${EMAIL_VERIFY_SMTP_DELAY_SECONDS:-6}
      REACHER_URL: ${REACHER_URL:-}
      REACHER_FROM_EMAIL: ${REACHER_FROM_EMAIL:-}
      PROXY_MODE: ${PROXY_MODE:-none}
      SCRAPOXY_URL: ${SCRAPOXY_URL:-}
      CROSSLINKED_SEARCH_ENGINES: ${CROSSLINKED_SEARCH_ENGINES:-yahoo}
      CROSSLINKED_TIMEOUT_SECONDS: ${CROSSLINKED_TIMEOUT_SECONDS:-120}
      # Change signals (changedetection.io → API → optional NOTIFY_WEBHOOK_URL)
      CHANGEDETECTION_URL: ${CHANGEDETECTION_URL:-http://changedetection:5000}
      CHANGEDETECTION_API_KEY: ${CHANGEDETECTION_API_KEY:-}
      NOTIFY_WEBHOOK_URL: ${NOTIFY_WEBHOOK_URL:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0}
      SENTRY_SEND_DEFAULT_PII: ${SENTRY_SEND_DEFAULT_PII:-false}
      ENABLE_ERROR_TRACKING_PROBE: ${ENABLE_ERROR_TRACKING_PROBE:-false}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    extra_hosts:
      - "host.docker.internal:${MULTILOGIN_HOST_IP:-host-gateway}"
    environment:
      API_TOKEN: change-me
      DATABASE_URL: postgresql+asyncpg://hyrepath:hyrepath@postgres:5432/hyrepath
      REDIS_URL: redis://redis:6379/0
      SOCIAL_ANALYZER_URL: http://social-analyzer:9005
      GMAPS_SCRAPER_URL: http://google-maps-scraper:8080
      # Tier 1 (LinkedIn photo) runs on the worker only â€” never enable on api.
      ENABLE_TIER1: ${ENABLE_TIER1:-false}
      BROWSER_MODE: ${BROWSER_MODE:-local}
      MULTILOGIN_SELENIUM_HOST: ${MULTILOGIN_SELENIUM_HOST:-http://host.docker.internal}
      LLM_MODE: ${LLM_MODE:-stub}
      LITELLM_API_BASE: ${LITELLM_API_BASE:-}
      LITELLM_API_KEY: ${LITELLM_API_KEY:-}
      LITELLM_MODEL: ${LITELLM_MODEL:-gpt-4o-mini}
      LITELLM_FALLBACKS: ${LITELLM_FALLBACKS:-}
      DISAMBIGUATION_THRESHOLD: ${DISAMBIGUATION_THRESHOLD:-0.7}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1}
      GITRECON_SCRIPT: /opt/gitrecon/gitrecon.py
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      EMAIL_SLEUTH_BIN: email-sleuth
      EMAIL_VERIFIER_URL: http://email-verifier:8080
      EMAIL_VERIFY_LEVEL: ${EMAIL_VERIFY_LEVEL:-basic}
      EMAIL_VERIFY_MAX_PER_JOB: ${EMAIL_VERIFY_MAX_PER_JOB:-10}
      EMAIL_VERIFY_SMTP_DELAY_SECONDS: ${EMAIL_VERIFY_SMTP_DELAY_SECONDS:-6}
      REACHER_URL: ${REACHER_URL:-}
      REACHER_FROM_EMAIL: ${REACHER_FROM_EMAIL:-}
      PROXY_MODE: ${PROXY_MODE:-none}
      SCRAPOXY_URL: ${SCRAPOXY_URL:-}
      CROSSLINKED_SEARCH_ENGINES: ${CROSSLINKED_SEARCH_ENGINES:-yahoo}
      CROSSLINKED_TIMEOUT_SECONDS: ${CROSSLINKED_TIMEOUT_SECONDS:-120}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0}
      SENTRY_SEND_DEFAULT_PII: ${SENTRY_SEND_DEFAULT_PII:-false}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    volumes:
      - tier1_artifacts:/app/backend/artifacts/tier1
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from app.workers.queue import get_redis_connection; get_redis_connection().ping()",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hyrepath
      POSTGRES_PASSWORD: psjjssjsjndj479987ffhudfui
      POSTGRES_DB: hyrepath
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hyrepath -d hyrepath"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s
  # ── Free-mode sidecars (default-on) ─────────────────────────────
  # AGPL tools stay isolated behind HTTP; never imported into app/.
  social-analyzer:
    build:
      context: .
      dockerfile: Dockerfile.social-analyzer
    ports:
      - "9005:9005"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:9005/get_settings').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    restart: unless-stopped
  # Built via Dockerfile.google-maps-scraper: upstream binary + Playwright
  # 1.57.0 driver from npm/nodejs.org (Hub :latest 404s on retired CDN).
  # Do not mount a volume over /opt â€” that shadows /opt/node and /opt/package.
  google-maps-scraper:
    build:
      context: .
      dockerfile: Dockerfile.google-maps-scraper
    command: ["-web", "-addr", "0.0.0.0:8080", "-data-folder", "/gmapsdata"]
    ports:
      - "8080:8080"
    volumes:
      - gmaps_data:/gmapsdata
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/docs"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 45s
    restart: unless-stopped
  email-verifier:
    build:
      context: .
      dockerfile: Dockerfile.email-verifier
    ports:
      - "8081:8080"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-qO-",
          "http://127.0.0.1:8080/v1/health@example.com/verification",
        ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    restart: unless-stopped

  # â”€â”€ Paid / heavy services (opt-in via `--profile`) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # Free-mode `docker compose up` never launches these. Flip the matching
  # provider mode flag AND start the profile when you pay.
  reacher:
    image: reacherhq/backend:latest
    profiles: ["paid"]
    environment:
      RCH_HTTP_HOST: 0.0.0.0
    restart: unless-stopped
  litellm:
    # Do NOT env_file the whole backend/.env â€” it injects Hyrepath DATABASE_URL
    # (sqlite) and crash-loops the proxy. Pass vendor keys via compose
    # --env-file ../.env interpolation only. Chat completions need no LiteLLM DB.
    # Newer proxy images require an explicit model_list (see litellm_config.yaml).
    image: ghcr.io/berriai/litellm:main-latest
    profiles: ["llm", "paid"]
    ports:
      - "4000:4000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # Only set LITELLM_MASTER_KEY in .env if you want proxy auth; an empty
      # value still enables "api key required" and breaks unauthenticated curls.
      # LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    restart: unless-stopped
  ollama:
    image: ollama/ollama:latest
    profiles: ["llm"]
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
  scrapoxy:
    image: scrapoxy/scrapoxy:latest
    profiles: ["paid"]
    restart: unless-stopped
  # NOTE: langfuse (v3) needs its own datastore stack; kept behind a profile so
  # a plain `docker compose up` stays light. LLMProvider.trace() is a no-op
  # until LANGFUSE_* is set, so free mode runs without it.
  langfuse:
    image: langfuse/langfuse:2
    profiles: ["observability"]
    environment:
      # Dedicated DB — do not share the app schema (hyrepath).
      DATABASE_URL: ${LANGFUSE_DATABASE_URL:-postgresql://hyrepath:hyrepath@postgres:5432/langfuse}
      NEXTAUTH_SECRET: change-me
      SALT: change-me
      NEXTAUTH_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3002:3000"
    restart: unless-stopped
  changedetection:
    image: ghcr.io/dgtlmoon/changedetection.io:latest
    profiles: ["observability"]
    environment:
      PORT: "5000"
      BASE_URL: ${CHANGEDETECTION_PUBLIC_URL:-http://localhost:5000}
    ports:
      - "5000:5000"
    volumes:
      - changedetection_data:/datastore
    restart: unless-stopped
  # Self-hosted Sentry-compatible error tracking. SDK is no-op until SENTRY_DSN is set.
  glitchtip-migrate:
    image: glitchtip/glitchtip:v4.1.5
    profiles: ["observability"]
    command: ./manage.py migrate
    environment: &glitchtip-env
      DATABASE_URL: ${GLITCHTIP_DATABASE_URL:-postgresql://hyrepath:psjjssjsjndj479987ffhudfui@postgres:5432/glitchtip}
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-change-me-glitchtip-secret}
      PORT: "8000"
      GLITCHTIP_DOMAIN: ${GLITCHTIP_PUBLIC_URL:-http://localhost:8001}
      REDIS_URL: redis://redis:6379/1
      ENABLE_USER_REGISTRATION: "true"
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: "no"
  glitchtip-web:
    image: glitchtip/glitchtip:v4.1.5
    profiles: ["observability"]
    environment: *glitchtip-env
    depends_on:
      glitchtip-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD-SHELL", "python3 /code/healthcheck.py || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 45s
    restart: unless-stopped
  glitchtip-worker:
    image: glitchtip/glitchtip:v4.1.5
    profiles: ["observability"]
    command: ./bin/run-celery-with-beat.sh
    environment: *glitchtip-env
    depends_on:
      glitchtip-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
volumes:
  postgres_data:
  tier1_artifacts:
  ollama_data:
  changedetection_data:
  gmaps_data:
