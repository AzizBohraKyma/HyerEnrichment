# Production overlay — use with base compose:
#   cd backend/docker
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Required host env (or ../.env.production via --env-file):
#   API_TOKEN, DATABASE_URL, REDIS_URL
#
# Tier 1 worker secrets: set WORKER_ENV_FILE=/etc/hyrepath/worker.env and use
#   -f docker-compose.tier1.yml as a third file when ENABLE_TIER1=true.
#
# TLS terminates at the reverse proxy (see docs/deployment.md); API listens HTTP :8000.
#
# NOTE: Compose merges `ports:` lists across -f files by concatenation, not
# override — a bare `ports:` here would ADD to docker-compose.yml's mapping
# instead of replacing it (api would then try to bind both 0.0.0.0:8000 and
# 127.0.0.1:8000, which self-conflicts and fails to start). The `!override`
# merge tag (Compose spec, Docker Compose v2.24+) forces a real replace.

services:
  migrate:
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}

  api:
    env_file:
      - ${API_ENV_FILE:-../.env.production}
    environment:
      APP_ENV: production
      API_TOKEN: ${API_TOKEN:?set API_TOKEN}
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      REDIS_URL: ${REDIS_URL:?set REDIS_URL}
    ports: !override
      - "127.0.0.1:8000:8000"
    restart: unless-stopped

  worker:
    env_file:
      - ${WORKER_ENV_FILE:-../.env.production}
    environment:
      APP_ENV: production
      API_TOKEN: ${API_TOKEN:?set API_TOKEN}
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      REDIS_URL: ${REDIS_URL:?set REDIS_URL}
    restart: unless-stopped

  postgres:
    ports: []
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-hyrepath}
    restart: unless-stopped

  redis:
    ports: []
    restart: unless-stopped

  social-analyzer:
    ports: !override []
    restart: unless-stopped

  google-maps-scraper:
    ports: !override []
    restart: unless-stopped

  email-verifier:
    ports: !override []
    restart: unless-stopped
