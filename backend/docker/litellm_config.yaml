# LiteLLM proxy config — no DATABASE_URL / spend DB.
# Wildcard lets the app send LITELLM_MODEL / LITELLM_FALLBACKS freely.
model_list:
  - model_name: "*"
    litellm_params:
      model: "*"
  - model_name: gemini/gemini-2.5-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY
  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

litellm_settings:
  drop_params: true

general_settings:
  store_model_in_db: false
