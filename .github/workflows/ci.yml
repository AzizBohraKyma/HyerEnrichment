name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Dependency audit (pip-audit + npm audit)
        run: bash scripts/dependency_audit.sh

  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dev dependencies
        run: pip install -e "backend[dev]"

      - name: Ruff
        run: ruff check backend/app backend/tests

      - name: Mypy
        run: mypy --config-file=backend/pyproject.toml backend/app

      - name: Pytest
        run: pytest backend/tests -m "not postgres" -q --cov=app --cov-report=term-missing

  frontend-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend for OpenAPI export
        run: pip install -e "backend[dev]"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Verify OpenAPI-generated types are up to date
        working-directory: frontend
        run: npm run openapi:check

      - name: Frontend typecheck
        working-directory: frontend
        run: npm run typecheck

  docker-smoke:
    runs-on: ubuntu-latest
    needs: [lint-test, frontend-contract, dependency-audit]
    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        run: make setup && make up

      - name: Wait for /health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8000/health; then
              echo "API is healthy"
              exit 0
            fi
            echo "Waiting for API... ($i/60)"
            sleep 5
          done
          echo "API did not become healthy in time"
          exit 1

      - name: Smoke test
        run: make smoke

      - name: Tear down stack
        if: always()
        run: make down
