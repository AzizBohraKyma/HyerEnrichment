# CD: build API/worker → GHCR → staging (auto on main) / production (approval).
# Dry-run: Actions → Deploy → Run workflow → dry_run=true (no registry push, no SSH).
# Validate locally:
#   actionlint .github/workflows/deploy.yml
#   (https://github.com/rhysd/actionlint — or:
#    go install github.com/rhysd/actionlint/cmd/actionlint@latest)

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Plan only — skip GHCR build/push and remote deploy"
        type: boolean
        default: false
      target:
        description: "Deploy target when not dry-run (production requires Environment approval)"
        type: choice
        options:
          - staging
          - production
        default: staging

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # Images: ghcr.io/<owner>/<repo>/api:<tag> and .../worker:<tag>
  IMAGE_NAME_API: ${{ github.repository }}/api
  IMAGE_NAME_WORKER: ${{ github.repository }}/worker

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      dry_run: ${{ steps.flags.outputs.dry_run }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      api_image: ${{ steps.meta.outputs.api_image }}
      worker_image: ${{ steps.meta.outputs.worker_image }}
      dispatch_target: ${{ steps.flags.outputs.dispatch_target }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve flags
        id: flags
        run: |
          DRY_RUN=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN=true
          fi
          TARGET=staging
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET="${{ inputs.target }}"
          fi
          echo "dry_run=${DRY_RUN}" >> "$GITHUB_OUTPUT"
          echo "dispatch_target=${TARGET}" >> "$GITHUB_OUTPUT"
          echo "DRY_RUN=${DRY_RUN} TARGET=${TARGET}"

      - name: Image metadata
        id: meta
        run: |
          TAG="${GITHUB_SHA}"
          API_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}"
          WORKER_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WORKER }}"
          # GHCR requires lowercase repository path
          API_IMAGE="$(echo "$API_IMAGE" | tr '[:upper:]' '[:lower:]')"
          WORKER_IMAGE="$(echo "$WORKER_IMAGE" | tr '[:upper:]' '[:lower:]')"
          {
            echo "image_tag=${TAG}"
            echo "api_image=${API_IMAGE}"
            echo "worker_image=${WORKER_IMAGE}"
          } >> "$GITHUB_OUTPUT"
          echo "Would publish:"
          echo "  ${API_IMAGE}:${TAG}"
          echo "  ${API_IMAGE}:latest"
          echo "  ${WORKER_IMAGE}:${TAG}"
          echo "  ${WORKER_IMAGE}:latest"

      - name: Verify Dockerfiles exist
        run: |
          test -f backend/docker/Dockerfile.api
          test -f backend/docker/Dockerfile.worker
          test -f backend/docker/docker-compose.yml
          test -f backend/docker/docker-compose.staging.yml
          test -f backend/docker/docker-compose.prod.yml

      - name: Set up Docker Buildx
        if: steps.flags.outputs.dry_run != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.flags.outputs.dry_run != 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        if: steps.flags.outputs.dry_run != 'true'
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/docker/Dockerfile.api
          push: true
          tags: |
            ${{ steps.meta.outputs.api_image }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.api_image }}:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push worker image
        if: steps.flags.outputs.dry_run != 'true'
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/docker/Dockerfile.worker
          push: true
          tags: |
            ${{ steps.meta.outputs.worker_image }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.worker_image }}:latest
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

      - name: Dry-run summary
        if: steps.flags.outputs.dry_run == 'true'
        run: |
          cat <<EOF
          === Deploy dry-run ===
          Ref: ${{ github.ref }}
          SHA: ${{ github.sha }}
          Target (dispatch): ${{ steps.flags.outputs.dispatch_target }}
          API image:    ${{ steps.meta.outputs.api_image }}:${{ steps.meta.outputs.image_tag }}
          Worker image: ${{ steps.meta.outputs.worker_image }}:${{ steps.meta.outputs.image_tag }}
          Staging compose:  docker-compose.yml + docker-compose.staging.yml
          Production compose: docker-compose.yml + docker-compose.prod.yml
          Dockerfiles: verified present under backend/docker/
          Skipped: GHCR build/push, SSH deploy
          EOF

  deploy-staging:
    needs: build-and-push
    if: |
      needs.build-and-push.outputs.dry_run != 'true' && (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'workflow_dispatch' && needs.build-and-push.outputs.dispatch_target == 'staging')
      )
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy staging via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT != '' && secrets.SSH_PORT || 22 }}
          script_stop: true
          envs: API_IMAGE,WORKER_IMAGE,IMAGE_TAG,GHCR_USER,GHCR_TOKEN,DEPLOY_PATH,COMPOSE_ENV_FILE
          script: |
            set -euo pipefail
            DEPLOY_PATH="${DEPLOY_PATH:-/opt/hyrepath/HyerPathEnrichment/backend/docker}"
            cd "$DEPLOY_PATH"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            {
              echo "services:"
              echo "  migrate:"
              echo "    image: ${API_IMAGE}:${IMAGE_TAG}"
              echo "  api:"
              echo "    image: ${API_IMAGE}:${IMAGE_TAG}"
              echo "  worker:"
              echo "    image: ${WORKER_IMAGE}:${IMAGE_TAG}"
            } > docker-compose.cd-images.yml
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.staging.yml \
              -f docker-compose.cd-images.yml \
              --env-file "${COMPOSE_ENV_FILE:-../.env.staging}" \
              pull api worker migrate
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.staging.yml \
              -f docker-compose.cd-images.yml \
              --env-file "${COMPOSE_ENV_FILE:-../.env.staging}" \
              up -d --no-build api worker redis postgres social-analyzer google-maps-scraper email-verifier
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.staging.yml \
              -f docker-compose.cd-images.yml \
              ps
        env:
          API_IMAGE: ${{ needs.build-and-push.outputs.api_image }}
          WORKER_IMAGE: ${{ needs.build-and-push.outputs.worker_image }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          GHCR_USER: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          COMPOSE_ENV_FILE: ${{ secrets.COMPOSE_ENV_FILE }}

  deploy-production:
    needs: build-and-push
    if: |
      needs.build-and-push.outputs.dry_run != 'true' &&
      github.event_name == 'workflow_dispatch' &&
      needs.build-and-push.outputs.dispatch_target == 'production'
    runs-on: ubuntu-latest
    # Requires a configured GitHub Environment named "production" with required reviewers.
    environment: production
    steps:
      - name: Deploy production via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT != '' && secrets.SSH_PORT || 22 }}
          script_stop: true
          envs: API_IMAGE,WORKER_IMAGE,IMAGE_TAG,GHCR_USER,GHCR_TOKEN,DEPLOY_PATH,COMPOSE_ENV_FILE
          script: |
            set -euo pipefail
            DEPLOY_PATH="${DEPLOY_PATH:-/opt/hyrepath/HyerPathEnrichment/backend/docker}"
            cd "$DEPLOY_PATH"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            {
              echo "services:"
              echo "  migrate:"
              echo "    image: ${API_IMAGE}:${IMAGE_TAG}"
              echo "  api:"
              echo "    image: ${API_IMAGE}:${IMAGE_TAG}"
              echo "  worker:"
              echo "    image: ${WORKER_IMAGE}:${IMAGE_TAG}"
            } > docker-compose.cd-images.yml
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              -f docker-compose.cd-images.yml \
              --env-file "${COMPOSE_ENV_FILE:-../.env.production}" \
              pull api worker migrate
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              -f docker-compose.cd-images.yml \
              --env-file "${COMPOSE_ENV_FILE:-../.env.production}" \
              up -d --no-build api worker redis postgres social-analyzer google-maps-scraper email-verifier
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              -f docker-compose.cd-images.yml \
              ps
        env:
          API_IMAGE: ${{ needs.build-and-push.outputs.api_image }}
          WORKER_IMAGE: ${{ needs.build-and-push.outputs.worker_image }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          GHCR_USER: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          COMPOSE_ENV_FILE: ${{ secrets.COMPOSE_ENV_FILE }}
